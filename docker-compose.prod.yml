services:

  nginx:
    restart: unless-stopped

  app:
    restart: unless-stopped
    volumes:
      - storage_data:/var/www/storage/app

  reverb:
    restart: unless-stopped

  queue:
    restart: unless-stopped
    volumes:
      - storage_data:/var/www/storage/app

  asterisk:
    restart: unless-stopped

  mariadb:
    restart: unless-stopped

  redis:
    restart: unless-stopped

volumes:
  storage_data: