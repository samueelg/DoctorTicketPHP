services:

  nginx:
    image: nginx:latest

    container_name: nginx

    ports:
      - "80:80"

    volumes:
      - ./:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf

    depends_on:
      - app

  app:
    build: .

    container_name: laravel

    volumes:
      - ./:/var/www

    depends_on:
      - mariadb

  reverb:
    build: .

    container_name: reverb

    command: php artisan reverb:start --host=0.0.0.0 --port=8080

    ports:
      - "8080:8080"

    volumes:
      - ./:/var/www

    depends_on:
      - app

  mariadb:
    image: mariadb:11

    container_name: mariadb

    restart: always

    ports:
      - "3307:3306"

    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: doctorticket
      MYSQL_USER: doctorticket
      MYSQL_PASSWORD: doctorticket123@

    volumes:
      - mariadb_data:/var/lib/mysql

  redis:
    image: redis:7-alpine

    container_name: redis

    restart: always


volumes:
  mariadb_data: